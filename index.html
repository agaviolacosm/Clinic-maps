<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live Clinics Map</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.js"></script>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="map"></div>

<script>
  // ====== CONFIG ======
  mapboxgl.accessToken = "pk.eyJ1IjoiYWdhdmlvbGEiLCJhIjoiY21rbGRodWZrMDN2ejNjb2k0am82ZTljeCJ9.lOZ8vPvRfOQ-TVUg41tzPw";
  const STYLE_URL = "mapbox://styles/agaviola/cmklp9kuk002901rw6xcf5s8l";
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzzcO8WZx2nCzd8HLi165HIjTkL0J4GSz1rK3lE54yzRpR5pKyniJZ6ynmLDQqXZ-s75BqVnh01eUU/pub?gid=1549359146&single=true&output=csv"; // Published CSV URL
  const SOURCE_ID = "clinics-live";
  const LAYER_ID = "clinics-icons-live";

  // Column names in Google Sheet (must match EXACTLY)
  const COL_LAT = "Latitude";
  const COL_LNG = "Longitude";
  const COL_STATE = "State";

  // Optional fields for popups (adjust to your actual columns)
  const COL_NAME = "Name";       // or "Clinic Name"
  const COL_ADDRESS = "Street Address 1"; // or "Full Address"
  const COL_PHONE = "Contact phone";     // or "Contact phone"
  const COL_WEBSITE = "Website";

  // ====== CSV PARSER (handles quoted commas) ======
  function parseCSV(text) {
    const rows = [];
    let row = [], cur = "", inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];

      if (ch === '"' && next === '"') { cur += '"'; i++; continue; }
      if (ch === '"') { inQuotes = !inQuotes; continue; }

      if (ch === "," && !inQuotes) { row.push(cur); cur = ""; continue; }

      if ((ch === "\n" || ch === "\r") && !inQuotes) {
        if (ch === "\r" && next === "\n") i++;
        row.push(cur);
        // skip empty trailing lines
        if (row.some(cell => cell.trim() !== "")) rows.push(row);
        row = []; cur = "";
        continue;
      }

      cur += ch;
    }

    if (cur.length || row.length) {
      row.push(cur);
      if (row.some(cell => cell.trim() !== "")) rows.push(row);
    }
    return rows;
  }

  function toFeatureCollection(csvText) {
    const rows = parseCSV(csvText);
    if (!rows.length) return { type: "FeatureCollection", features: [] };

    const header = rows[0].map(h => h.trim());
    const idx = (name) => header.indexOf(name);

    const latI = idx(COL_LAT);
    const lngI = idx(COL_LNG);
    if (latI === -1 || lngI === -1) {
      throw new Error(`Missing required columns: ${COL_LAT} and/or ${COL_LNG}. Found: ${header.join(", ")}`);
    }

    const features = [];
    for (let r = 1; r < rows.length; r++) {
      const row = rows[r];
      const lat = parseFloat((row[latI] || "").trim());
      const lng = parseFloat((row[lngI] || "").trim());
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;

      // Build properties object from all columns
      const props = {};
      for (let c = 0; c < header.length; c++) props[header[c]] = (row[c] || "").trim();

      features.push({
        type: "Feature",
        properties: props,
        geometry: { type: "Point", coordinates: [lng, lat] }
      });
    }

    return { type: "FeatureCollection", features };
  }

  async function loadClinicsGeoJSON() {
    // cache-bust so you see sheet updates quickly
    const url = SHEET_CSV_URL + (SHEET_CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Failed to fetch sheet CSV: HTTP ${res.status}`);
    const csvText = await res.text();
    return toFeatureCollection(csvText);
  }

  // ====== MAP INIT ======
  const map = new mapboxgl.Map({
    container: "map",
    style: STYLE_URL,
    center: [-95, 56],
    zoom: 3.8
  });

  map.addControl(new mapboxgl.NavigationControl(), "top-right");

  map.on("load", async () => {
    const geojson = await loadClinicsGeoJSON();

       //debugging 
     map.on("mousemove", (e) => {
  const fs = map.queryRenderedFeatures(e.point);
  if (fs.length) {
    console.log("Hovering layer:", fs[0]?.layer?.id);
  }
});
    // Add (or update) source
    map.addSource(SOURCE_ID, {
      type: "geojson",
      data: geojson
      // You can enable clustering later if you want:
      // cluster: true, clusterRadius: 50, clusterMaxZoom: 10
    });

    //Custom icon 
    await new Promise((resolve, reject) => {
  map.loadImage("./location_on.png", (err, image) => {
    if (err) return reject(err);
    
    if (!map.hasImage("clinic-pin")) map.addImage("clinic-pin", image, { sdf: true });
    resolve();
  });
});
    // Add icon layer
    map.addLayer({
      id: LAYER_ID,
      type: "symbol",
      source: SOURCE_ID,
      layout: {
        // pick a built-in icon from your style's sprite (or use your custom one)
        "icon-image": "clinic-pin",
        "icon-size": ["interpolate", ["linear"], ["zoom"], 3, 0.8, 8, 1.2, 12, 1.6],
        "icon-allow-overlap": true, 
        "icon-ignore-placement": true
      },
      paint: {
        // Color by province/state
        "icon-color": [
          "match", ["get", COL_STATE],
          "ON", "#000000",
          "QC", "#1E5BFF",
          "AB", "#FF7A00",
          "BC", "#1AA6A6",
          "SK", "#2E8B57",
          "#999999"
        ], 
        "icon-halo-color": "#ffffff",
        "icon-halo-width": 1
      }

     
     
    });

//debugging 
    console.log("Does my runtime layer exist?", map.getLayer(LAYER_ID));
    
    // Hover cursor
    map.on("mouseenter", LAYER_ID, () => map.getCanvas().style.cursor = "pointer");
    map.on("mouseleave", LAYER_ID, () => map.getCanvas().style.cursor = "");

    // Click popup (uses your real headers)
map.on("click", (e) => {
  const features = map.queryRenderedFeatures(e.point, { layers: [LAYER_ID] });
  const f = features[0];
  if (!f) return;
  
  const p = f.properties || {};

//Flys to pin location 
  map.flyTo({
  center: f.geometry.coordinates,
  zoom: 11,
  speed: 0.9,
  curve: 1.2,
  essential: true
});
 // small delay so popup appears after zoom
  setTimeout(() => {
  
  //debugging
  console.log("STATE RAW:", JSON.stringify(p[COL_STATE]), "ALL KEYS:", Object.keys(p));

  // Basic HTML escape so weird characters don't break popup
  const esc = (s) =>
    String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");

  // Normalize website links (so "www..." becomes clickable)
  const normalizeUrl = (url) => {
    const u = String(url || "").trim();
    if (!u) return "";
    if (u.startsWith("http://") || u.startsWith("https://")) return u;
    return "https://" + u;
  };

  // sheet headers (mix of constants + direct header strings)
  const name = p[COL_NAME] || "Clinic";
  const phone = p[COL_PHONE] || "";

  const addr1 = p[COL_ADDRESS] || "";
  const addr2 = p["Street Address 2"] || "";
  const state = p[COL_STATE] || "";
  const zip = p["Zip"] || "";

  const contactName = p["Contact name"] || "";
  const contactEmail = p["Contact email"] || "";

  const website = normalizeUrl(p[COL_WEBSITE] || "");

  const addressLine1 = [addr1, addr2].filter(Boolean).join(", ");
  const addressLine2 = [state, zip].filter(Boolean).join(", ");


  const websiteHtml = website
    ? `<div style="margin-top:8px;">
         <a href="${esc(website)}" target="_blank" rel="noopener">Visit website</a>
       </div>`
    : "";

  const contactHtml =
    contactName || contactEmail || phone
      ? `<div style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(0,0,0,0.1);">
           ${contactName ? `<div><strong>Contact:</strong> ${esc(contactName)}</div>` : ""}
           ${contactEmail ? `<div><strong>Email:</strong> ${esc(contactEmail)}</div>` : ""}
           ${phone ? `<div style="margin-top:4px;">📞 ${esc(phone)}</div>` : ""}
         </div>`
      : "";

  new mapboxgl.Popup({ closeButton: true, closeOnClick: true })
    .setLngLat(e.lngLat)
    .setHTML(`
      <div style="font-family: system-ui; font-size: 14px; line-height: 1.35; min-width: 220px;">
        <div style="font-weight: 800; margin-bottom: 4px;">${esc(name)}</div>
        ${addressLine1 ? `<div>${esc(addressLine1)}</div>` : ""}
        ${addressLine2 ? `<div>${esc(addressLine2)}</div>` : ""}
        ${contactHtml}
        ${websiteHtml}
      </div>
    `)
    .addTo(map);

  }, 500); 
});

    // Optional: auto-refresh data every 2 minutes (so new clinics show without redeploy)
    setInterval(async () => {
      try {
        const updated = await loadClinicsGeoJSON();
        map.getSource(SOURCE_ID).setData(updated);
        console.log("Refreshed clinics:", updated.features.length);
      } catch (err) {
        console.warn("Refresh failed:", err);
      }
    }, 120000);
  });
</script>
</body>
</html>
